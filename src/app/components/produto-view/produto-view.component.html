<div class="container py-5">
  <div class="glass-card mx-auto shadow p-4" style="max-width: 800px;">
    <h2 class="text-center mb-4 text-primary fw-bold">Consulta de Estoque 🔍</h2>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Produto</th>
            <th>Descrição</th>
            <th class="text-end">Preço</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listaProdutos">
            <td><strong>{{ item.nome }}</strong></td>
            <td><small class="text-muted">{{ item.descricao }}</small></td>
            <td class="text-end text-success fw-bold">R$ {{ item.preco }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-1">
                <i class="bi bi-eye"></i> Detalhes
              </button>
            </td>
          </tr>
          <tr *ngIf="listaProdutos.length === 0">
            <td colspan="4" class="text-center py-4 text-muted">
              Nenhum produto cadastrado no sistema.
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-3 text-end">
      <span class="badge bg-secondary">Total de Itens: {{ listaProdutos.length }}</span>
    </div>
  </div>
</div>
