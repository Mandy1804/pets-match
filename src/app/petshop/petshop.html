<div class="container">
  <h2>Pet Shop</h2>

  <div class="row">
    <div class="col-md-4 mb-4 d-flex justify-content-center" *ngFor="let pet of pets">

      <div class="card">

        <img [src]="pet.imagens[pet.imagemAtual]" class="card-img-top">

        <div class="card-body">
          <h5>{{ pet.nome }}</h5>
          <p>{{ pet.tipo }}</p>

          <div class="preco">
            R$ {{ pet.preco }}
          </div>

          <button class="btn btn-outline-primary me-2"
                  (click)="verDetalhes(pet)">
            Ver
          </button>

          <button class="btn btn-primary"
                  (click)="comprar(pet)">
            Comprar
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
